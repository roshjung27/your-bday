<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drag It 😈</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #word {
      font-size: 3rem;
      color: #ff1a1a;
      font-weight: bold;
      position: absolute;
      cursor: grab;
      user-select: none;
      transition: transform 0.1s;
    }

    #word:active {
      cursor: grabbing;
      transform: scale(1.1);
    }

    .fly-up {
      animation: flyUp 0.8s ease forwards;
    }

    @keyframes flyUp {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-200px) scale(1.5);
      }
    }
  </style>
</head>
<body>

<div id="word">FUCK YOU 🖕</div>

<script>
  const word = document.getElementById("word");

  let isDragging = false;
  let startY = 0;

  // Mouse events
  word.addEventListener("mousedown", (e) => {
    isDragging = true;
    startY = e.clientY;
  });

  document.addEventListener("mouseup", (e) => {
    if (!isDragging) return;
    isDragging = false;

    if (startY - e.clientY > 80) {
      triggerFly();
    }
  });

  // Touch events (mobile)
  word.addEventListener("touchstart", (e) => {
    isDragging = true;
    startY = e.touches[0].clientY;
  });

  document.addEventListener("touchend", (e) => {
    if (!isDragging) return;
    isDragging = false;

    const endY = e.changedTouches[0].clientY;
    if (startY - endY > 80) {
      triggerFly();
    }
  });

  function triggerFly() {
    word.classList.add("fly-up");

    setTimeout(() => {
      word.classList.remove("fly-up");
    }, 800);
  }
</script>

</body>
</html>
