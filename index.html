<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 Happy Birthday Samikshya! 🎉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Stars */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* Cake Container - FULL CLICKABLE */
        .cake-container {
            text-align: center;
            position: relative;
            z-index: 10;
            cursor: pointer;
        }

        /* Cake */
        .cake {
            position: relative;
            margin: 0 auto 40px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .layer {
            background: linear-gradient(145deg, #f8b500, #e6a700);
            border-radius: 10px;
            position: relative;
            margin: 0 auto 8px;
            box-shadow: 
                0 10px 20px rgba(0,0,0,0.3),
                inset 0 2px 5px rgba(255,255,255,0.3);
        }

        .layer-1 { width: 200px; height: 60px; }
        .layer-2 { width: 160px; height: 50px; }
        .layer-3 { width: 120px; height: 40px; }

        /* Candles */
        .candles {
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }

        .candle {
            width: 8px;
            height: 40px;
            background: linear-gradient(to top, #f4e4bc, #fff);
            border-radius: 4px 4px 2px 2px;
            position: relative;
            box-shadow: inset 0 2px 3px rgba(0,0,0,0.2);
        }

        .flame {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 16px;
            background: radial-gradient(circle, #ff6b35, #ff8e53, #ffb347);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: flicker 0.1s infinite alternate;
            filter: drop-shadow(0 0 8px #ff6b35);
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) translateY(0) scale(1); }
            100% { transform: translateX(-50%) translateY(-1px) scale(1.1); }
        }

        /* Text - HIDDEN FIRST */
        .birthday-text, .sub-text {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.5s ease-out;
        }

        .birthday-text {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4d96ff);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            margin-bottom: 15px;
        }

        .sub-text {
            font-size: 1.4rem;
            color: white;
            font-weight: 300;
            transition-delay: 0.3s;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Show text */
        .celebrating .birthday-text,
        .celebrating .sub-text {
            opacity: 1;
            transform: translateY(0);
        }

        /* Balloons */
        .balloons {
            position: fixed;
            bottom: -100px;
            left: 0;
            width: 100%;
            height: 200vh;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .balloon {
            position: absolute;
            bottom: 0;
            width: 50px;
            height: 60px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: balloonLaunch 6s ease-out infinite;
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 40px;
            background: #333;
        }

        @keyframes balloonLaunch {
            0% {
                transform: translateY(0) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: translateY(-20px) scale(1);
            }
            100% {
                transform: translateY(-120vh) rotate(20deg) scale(1.2);
                opacity: 0;
            }
        }

        /* Fireworks */
        .fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
        }

        .firework {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            animation: fireworkBurst 1.5s ease-out forwards;
            box-shadow: 0 0 10px currentColor;
        }

        @keyframes fireworkBurst {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            50% { opacity: 1; }
            100% {
                transform: scale(0) translate(var(--dx), var(--dy));
                opacity: 0;
            }
        }

        /* Blow effect */
        .blow-effect .blow-circle {
            position: absolute;
            border: 2px solid rgba(255,255,255,0.8);
            border-radius: 50%;
            animation: blowOut 1s ease-out forwards;
        }

        @keyframes blowOut {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(5); opacity: 0; }
        }

        /* Instructions */
        .click-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.9);
            font-size: 1.2rem;
            animation: pulse 1.5s infinite;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .layer-1 { width: 160px; height: 50px; }
            .layer-2 { width: 130px; height: 40px; }
            .layer-3 { width: 100px; height: 35px; }
            .birthday-text { font-size: 2rem; }
            .sub-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <!-- Stars -->
    <div class="stars" id="starsContainer"></div>
    
    <!-- Main Container - FULLY CLICKABLE -->
    <div class="cake-container" id="mainContainer">
        <div class="cake">
            <div class="candles">
                <div class="candle">
                    <div class="flame" id="flame1"></div>
                </div>
                <div class="candle">
                    <div class="flame" id="flame2"></div>
                </div>
                <div class="candle">
                    <div class="flame" id="flame3"></div>
                </div>
            </div>
            <div class="layer layer-1"></div>
            <div class="layer layer-2"></div>
            <div class="layer layer-3"></div>
        </div>
        
        <!-- Text appears AFTER blowing -->
        <div class="birthday-text">Happy Birthday Samikshya!</div>
        <div class="sub-text">Wishing you happiness today and forever. Sending you lots of love 💕</div>
        
        <!-- Blow effect -->
        <div class="blow-effect" id="blowEffect"></div>
    </div>

    <!-- Balloons -->
    <div class="balloons" id="balloons"></div>
    
    <!-- Fireworks -->
    <div class="fireworks" id="fireworks"></div>

    <!-- Clear instruction -->
    <div class="click-hint" id="clickHint">
        👆 TAP OR CLICK ANYWHERE ON THE CAKE! 💨
    </div>

    <script>
        console.log("🎂 Birthday page loaded - READY TO CLICK!");

        // Create stars
        function createStars() {
            const container = document.getElementById('starsContainer');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }

        // Blow candles function
        function blowCandles() {
            console.log("🎉 CLICK DETECTED - BLOWING CANDLES!");
            
            const container = document.getElementById('mainContainer');
            const flames = document.querySelectorAll('.flame');
            const blowEffect = document.getElementById('blowEffect');
            const hint = document.getElementById('clickHint');
            const cake = document.querySelector('.cake');
            
            // Stop cake animation
            cake.style.animation = 'none';
            
            // Create blow effect
            for (let i = 0; i < 6; i++) {
                const circle = document.createElement('div');
                circle.className = 'blow-circle';
                circle.style.width = circle.style.height = (30 + i * 30) + 'px';
                circle.style.left = '50%';
                circle.style.top = '50%';
                circle.style.animationDelay = i * 0.1 + 's';
                blowEffect.appendChild(circle);
            }
            
            // Extinguish each flame
            flames.forEach((flame, index) => {
                setTimeout(() => {
                    flame.style.animation = 'none';
                    flame.style.opacity = '0';
                    flame.style.transform = 'scale(0)';
                }, index * 100);
            });
            
            // Hide hint
            hint.style.opacity = '0';
            
            // Start celebration after 1 second
            setTimeout(() => {
                container.classList.add('celebrating');
                launchBalloons();
                launchFireworks();
            }, 1000);
            
            // Reset after 8 seconds
            setTimeout(() => {
                location.reload();
            }, 8000);
        }

        // Balloons from bottom
        function launchBalloons() {
            const container = document.getElementById('balloons');
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24', '#ff9ff3', '#6c5ce7'];
            
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const balloon = document.createElement('div');
                    balloon.className = 'balloon';
                    balloon.style.left = Math.random() * 100 + '%';
                    balloon.style.background = colors[Math.floor(Math.random() * colors.length)];
                    balloon.style.animationDelay = Math.random() * 1 + 's';
                    container.appendChild(balloon);
                    
                    setTimeout(() => balloon.remove(), 6000);
                }, i * 200);
            }
            container.style.opacity = '1';
        }

        // Fireworks
        function launchFireworks() {
            const container = document.getElementById('fireworks');
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24', '#ff9ff3', '#6c5ce7'];
            
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const firework = document.createElement('div');
                    firework.className = 'firework';
                    firework.style.left = Math.random() * 100 + '%';
                    firework.style.top = Math.random() * 50 + '%';
                    firework.style.background = colors[Math.floor(Math.random() * colors.length)];
                    
                    const angle = (i / 15) * Math.PI * 2;
                    const dist = 200 + Math.random() * 100;
                    firework.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
                    firework.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
                    
                    container.appendChild(firework);
                    setTimeout(() => firework.remove(), 1500);
                }, i * 150);
            }
            container.style.opacity = '1';
        }

        // 🔥 FIXED CLICK - WORKS EVERYWHERE!
        document.getElementById('mainContainer').addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            blowCandles();
        });

        // Also works on touch for mobile
        document.getElementById('mainContainer').addEventListener('touchstart', function(e) {
            e.preventDefault();
            blowCandles();
        });

        // Initialize
        createStars();
        console.log("✅ Page ready! Click the cake area anywhere!");
    </script>
</body>
</html>
